lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      '@typescript-eslint/eslint-plugin':
        specifier: ^8.18.0
        version: null
      '@typescript-eslint/parser':
        specifier: ^8.18.0
        version: null
      eslint:
        specifier: ^9.17.0
        version: null
      eslint-config-next:
        specifier: ^15.1.3
        version: null
      prettier:
        specifier: ^3.4.2
        version: null
      turbo:
        specifier: ^2.3.3
        version: null
      typescript:
        specifier: ^5.7.2
        version: null

  apps/api:
    dependencies:
      '@ubos/config':
        specifier: workspace:*
        version: link:../../packages/config
      '@ubos/shared':
        specifier: workspace:*
        version: link:../../packages/shared
      fastify:
        specifier: ^5.2.1
        version: null
      zod:
        specifier: ^3.24.1
        version: null
    devDependencies:
      '@types/node':
        specifier: ^22.10.5
        version: null
      tsx:
        specifier: ^4.19.2
        version: null

  apps/web:
    dependencies:
      '@ubos/shared':
        specifier: workspace:*
        version: link:../../packages/shared
      '@ubos/ui':
        specifier: workspace:*
        version: link:../../packages/ui
      next:
        specifier: ^15.1.3
        version: null
      react:
        specifier: ^19.0.0
        version: null
      react-dom:
        specifier: ^19.0.0
        version: null
    devDependencies:
      '@types/node':
        specifier: ^22.10.5
        version: null
      '@types/react':
        specifier: ^19.0.2
        version: null
      '@types/react-dom':
        specifier: ^19.0.2
        version: null
      autoprefixer:
        specifier: ^10.4.20
        version: null
      postcss:
        specifier: ^8.4.49
        version: null
      tailwindcss:
        specifier: ^3.4.17
        version: null

  packages/config:
    devDependencies:
      '@types/node':
        specifier: ^22.10.5
        version: null

  packages/db:
    dependencies:
      '@prisma/client':
        specifier: ^6.1.0
        version: null
    devDependencies:
      prisma:
        specifier: ^6.1.0
        version: null

  packages/shared:
    dependencies:
      zod:
        specifier: ^3.24.1
        version: null

  packages/ui:
    dependencies:
      '@ubos/shared':
        specifier: workspace:*
        version: link:../shared
      react:
        specifier: ^19.0.0
        version: null
    devDependencies:
      '@types/react':
        specifier: ^19.0.2
        version: null
    peerDependencies:
      react:
        specifier: ^19.0.0
        version: null
